# yai configuration
# Copy this file to yai.yaml and fill in your real keys.
#
# Environment variable expansion:
#   ${VAR}            — replaced with the value of $VAR (empty string if unset)
#   ${VAR:-default}   — replaced with $VAR, or "default" if unset/empty
#
# Example: keep secrets out of this file
#   key: ${YAI_ANTHROPIC_KEY}
# Then: export YAI_ANTHROPIC_KEY=sk-ant-xxx && ./yai

server:
  host: 0.0.0.0
  port: 8080
  shutdown_timeout: 30s   # graceful shutdown timeout (default: 30s)

auth:
  tokens:
    - name: cicada-main
      token: ${YAI_AUTH_TOKEN:-changeme}
      rate_limit: 60/min    # optional: requests per window (e.g. 60/min, 1000/hour, 10/s)

providers:
  - name: anthropic
    upstream: https://api.anthropic.com
    auth:
      type: x-api-key
      key: ${YAI_ANTHROPIC_KEY}
    extra_headers:
      anthropic-version: "2023-06-01"
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: deepseek
    upstream: https://api.deepseek.com
    auth:
      type: bearer
      key: ${YAI_DEEPSEEK_KEY}
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: ollama
    upstream: http://localhost:11434
    auth:
      type: none
    health_check:
      method: GET
      path: /v1/models
      interval: 10s
      timeout: 2s

  - name: gemini
    upstream: https://generativelanguage.googleapis.com
    auth:
      type: query-param
      key: ${YAI_GEMINI_KEY}
      param_name: key
    health_check:
      method: GET
      path: /v1beta/models
      interval: 30s
      timeout: 5s

  # --- OAuth2 examples (uncomment to use) ---

  # Baidu Wenxin (ERNIE) — uses client credentials OAuth2
  # - name: baidu
  #   upstream: https://aip.baidubce.com
