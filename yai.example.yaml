# yai configuration
# Copy this file to yai.yaml and fill in your real keys.

server:
  host: 0.0.0.0
  port: 8080

auth:
  tokens:
    - name: cicada-main
      token: yai_change_me

providers:
  - name: anthropic
    upstream: https://api.anthropic.com
    auth:
      type: x-api-key
      key: sk-ant-api03-change-me
    extra_headers:
      anthropic-version: "2023-06-01"
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: deepseek
    upstream: https://api.deepseek.com
    auth:
      type: bearer
      key: sk-deepseek-change-me
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: ollama
    upstream: http://localhost:11434
    auth:
      type: none
    health_check:
      method: GET
      path: /v1/models
      interval: 10s
      timeout: 2s

  - name: gemini
    upstream: https://generativelanguage.googleapis.com
    auth:
      type: query-param
      key: AIzaSy-change-me
      param_name: key
    health_check:
      method: GET
      path: /v1beta/models
      interval: 30s
      timeout: 5s

fallback:
  groups:
    - name: openai-compat
      providers: [deepseek, ollama]
      strategy: priority
      retry:
        max_attempts: 2
        timeout: 30s
