# yai configuration
# Copy this file to yai.yaml and fill in your real keys.

server:
  host: 0.0.0.0
  port: 8080

auth:
  tokens:
    - name: cicada-main
      token: yai_change_me

providers:
  - name: anthropic
    upstream: https://api.anthropic.com
    auth:
      type: x-api-key
      key: sk-ant-api03-change-me
    extra_headers:
      anthropic-version: "2023-06-01"
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: deepseek
    upstream: https://api.deepseek.com
    auth:
      type: bearer
      key: sk-deepseek-change-me
    health_check:
      method: GET
      path: /v1/models
      interval: 30s
      timeout: 5s

  - name: ollama
    upstream: http://localhost:11434
    auth:
      type: none
    health_check:
      method: GET
      path: /v1/models
      interval: 10s
      timeout: 2s

  - name: gemini
    upstream: https://generativelanguage.googleapis.com
    auth:
      type: query-param
      key: AIzaSy-change-me
      param_name: key
    health_check:
      method: GET
      path: /v1beta/models
      interval: 30s
      timeout: 5s

  # --- OAuth2 examples (uncomment to use) ---

  # Baidu Wenxin (ERNIE) — uses client credentials OAuth2
  # - name: baidu
  #   upstream: https://aip.baidubce.com
  #   auth:
  #     type: oauth2-client-credentials
  #     token_url: https://aip.baidubce.com/oauth/2.0/token
  #     client_id: your-api-key
  #     client_secret: your-secret-key
  #   health_check:
  #     method: GET
  #     path: /rpc/2.0/ai_custom/v1/wenxinworkshop/chat/completions
  #     interval: 60s
  #     timeout: 5s

  # Google Vertex AI — uses GCP service account OAuth2
  # - name: vertex
  #   upstream: https://us-central1-aiplatform.googleapis.com
  #   auth:
  #     type: oauth2-service-account
  #     credentials_file: /path/to/service-account.json
  #     scopes:
  #       - https://www.googleapis.com/auth/cloud-platform
  #   health_check:
  #     method: GET
  #     path: /v1/projects/your-project/locations/us-central1/publishers/google/models
  #     interval: 60s
  #     timeout: 5s

fallback:
  groups:
    - name: openai-compat
      providers: [deepseek, ollama]
      strategy: priority
      retry:
        max_attempts: 2
        timeout: 30s
